<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent {
            
            width: 400px;
            height: 300px;
            border: 2px solid black;
        }
        .child {
            position: absolute;
            right: 10px;
            bottom: 10px;

        }
    </style>
</head>
<body>
    <div class="parent">
    <div class="child">여기!</div>
</div>
</body>
</html>
<!-- 부모에 position: relative가 없으면 어떻게 되는지 테스트 후 주석 작성
       부모에 position: relative가 없으면 head를 기준으로 right: 10px
            bottom: 10px 이동함  -->

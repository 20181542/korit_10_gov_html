<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box-a {
            width: 200px;
            padding: 20px;
            border: 5px solid black;
            box-sizing: content-box;  /* 기본값 */
        }   

        .box-b {
            width: 200px;
            padding: 20px;
            border: 5px solid black;
            margin: auto;
        }
    </style>
</head>
<body>
    <div class="box-a"></div>
    <div class="box-b"></div>
</body>
</html>
<!-- - box-a의 실제 보이는 너비: px (계산 과정:)
- box-b의 실제 보이는 너비: ___px (계산 과정: ___________)
- 어느 것이 더 직관적인가? 이유는? -->

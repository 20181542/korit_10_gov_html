<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .tag {
            display: inline-block;
            width: 100px;
            height: 40px;
            background-color: #eee;
            text-align: center;
            margin: 5px;
        }
        /* display: inline이면 왜 width/height가 안 먹는지 주석으로 설명
            text를 inline 으로 하면 글자의 크기에 따라 너비이와 높이가
            달라지기 때문에 inline=block으로 바꿔 줘야만 너비와 높이를
            조정할수 있다 */
    </style>
</head>
<body>
    <span class="tag">Java</span>
<span class="tag">Python</span>
<span class="tag">CSS</span>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-image: url("./images/bg1.jpg");
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
        }
        .container {
            margin: 0 auto;
            box-sizing: border-box;
            width: 1200px;
            height: 600px;
            background-color: #fafafa;
            overflow: hidden;
        }
        .profile-image {
            margin: 50px auto;
            box-sizing: border-box;
            border: 1px solid #dbdbdb;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            box-shadow: 0 0 10px 5px #00000044;
            background-image: url(/basic2/images/default-profile.jpg);
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background: linear-gradient(linear-gradient(221deg,rgba(42, 123, 155, 1) 0%, rgba(57, 93, 150, 1) 17%, rgba(64, 161, 144, 1) 25%, rgba(71, 172, 141, 1) 37%, rgba(87, 199, 133, 1) 50%, rgba(121, 204, 192, 1) 61%, rgba(167, 211, 106, 1) 77%, rgba(237, 83, 121, 1) 100%);
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-image"></div>
        <div class="profile-image"></div>
        <div class="profile-image"></div>
        
    </div>
    
</body>
</html>

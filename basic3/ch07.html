<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         .a {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            width: 1200px;
            height: 100%;

         }

        .b {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #bbb;
            box-sizing: border-box;
            padding: 10px;
        }

        .c{
            position: relative;
            margin-bottom: 15px;
            border-radius: 4px;
            padding: 5px;
            border: 1px solid black;
            box-sizing: border-box;
            width: 360px;
            height: 50%;

            & > label {
                transition: all 0.3s ease-in-out;
                transform: translateY(-50%);
                position: absolute;
                top: 50%;
                left: 10px;
                background-color: transparent;
                font-size: 14px;
                color: #444;
            }
            & > input {
                transition: all 0.3s ease-in-out;
                position: relative;
                z-index: 10;
                outline: none;
                border: none;
                width: 100%;
                height: 100%;
                background-color: #00000000;
            }
        }

        button {
            margin-bottom: 15px;
            border-radius: 4px;
            background-color: blue;
            color: white;
            width: 360px;
        }
        
    </style>
</head>
<body>
    <!-- 1. input 2개 (username, password) -->
    <!-- 2. button 1개 (등록하기) -->
    <div class="a">
        <div class="b">
            <div class="c">
                <input type="text">
                <label for="username">사용자 이름</label>
            </div>
            <div class="c">
                <input type="password">
                <label for="password">비밀번호</label>
            </div>
            <div >
                <button>등록하기</button>
            </div>

            
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>이름</th>
            </tr>
            <tbody class="name-table-body">

            </tbody>
        </thead>
    </table>



    <script>
        //--------- map 설명----------------------------
        // map(mapping) -> 일치하는 것을 1 : 1로 짝짓는다.
        // map을 쓴다는 것은 무조건 배열이다
        // 무조건 갯수가 같아야함
        // [10, 20, 30] - [100, 200, 300]
        // ["준일", "준이", "준삼"] -> ["김준일", "김준이", "김준삼"]
        // [{name: "준일"}, {name: "준이"}, {name: "준이"}] ->
        // ["준일", "준이", "준이"]

        const arrayObject = {
            arr: [],

            map: (mapFx) => {
                console.log("1: " + mapFx);
                const newArray = [];
                console.log("2: " + arrayObject.arr);
                for (let i = 0; i < arrayObject.arr.length; i++) {
                    console.log("3: " + mapFx(arrayObject.arr[i]));
                    newArray.push(mapFx(arrayObject.arr[i]));
                }
                console.log("4: " + newArray);
                return newArray;
            },

            filter: (predicate) => {
                const newArray = [];
                for (let i = 0; i < arrayObject.arr.length; i++) {
                    if (predicate(arrayObject.arr[i])) {
                        newArray.push(arrayObject.arr[i])
                    }
                }
                return newArray;
            }
        }

        const names = ["준일", "준이", "준삼"];
        console.log(names);
        arrayObject.arr = names;
        console.log(arrayObject.map(name => "김" + name));
        console.log(arrayObject.filter(name => name.includes("이")));


        
        const box1 = {
            miniBox: {
                content: "미니박스1",
            }
        }

        const box2 = {
            miniBox: {
                content: "미니박스2",
            }
        }

        const box3 = {
            miniBox: {
                content: "미니박스3",
            }
        }

        const boxList = [box1, box2, box3, ];
        // 방법 1
        const miniBoxList = [box1.miniBox, box2.miniBox, box3.miniBox, ];
        // 방법 2
        const miniBoxList2 = [];
        // 방법 3
        for (let box of boxList) {
            miniBoxList2.push(box.miniBox);
        }

        const miniBoxList3 = boxList.map(box => box.miniBox);
        console.log(miniBoxList3);

        const miniBoxList4 = boxList.map(box => box.miniBox.content);
        console.log(miniBoxList4);



        const name = "김준일";
        const message = `${name}님 환영합니다.`;
        console.log(message);

        const nameList = ["김준일", "김준이", "김준삼",];
        console.log(["<tr><td>김준일</td></tr>","<tr><td>김준이</td></tr>","<tr><td>김준삼</td></tr>" ]);

        const nameList1 = nameList.map(name => "<tr><td>" + name + "</td></tr>");
        console.log(nameList1); 
        console.log(nameList.map(name => `<tr><td>${name}</td></tr>`)); 

        const tableBody = document.querySelector(".name-table-body");
        console.log({tableBody});
        tableBody.innerHTML = nameList.map(name => `<tr><td>${name}</td></tr>`).join("");









    </script>
</body>
</html>
